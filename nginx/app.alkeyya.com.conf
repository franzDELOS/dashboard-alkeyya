# Alkeyya Customer Dashboard — app.alkeyya.com
# Drop into /etc/nginx/sites-available/ and symlink into sites-enabled/.
# Reuses your existing wildcard cert for *.alkeyya.com.
#
# Routing:
#   /        -> Next.js web app   (127.0.0.1:3001)
#   /api/    -> Express API        (127.0.0.1:3020, /api prefix stripped)
#
# ===========================================================================
# HSTS WARNING: Once deployed with these headers, browsers will cache the
# HTTPS requirement for 2 years (max-age=63072000). Test on a staging URL
# first if possible. To undo HSTS you must serve max-age=0 and wait for the
# cache to expire in EVERY browser that visited the site — there is no remote
# kill switch. Only keep the Strict-Transport-Security line below enabled
# AFTER you have confirmed HTTPS works end-to-end at https://app.alkeyya.com.
# (And `preload` additionally submits the domain to the browser preload list,
# which is effectively permanent — remove `preload` if you are not ready for
# that commitment.)
# ===========================================================================
#
# server_tokens: Nginx's version is hidden from headers/error pages by adding
#   `server_tokens off;`  — but that directive belongs in the `http { }` block
#   of /etc/nginx/nginx.conf, NOT here in the site conf. Add it there once.

# ---- HTTP -> HTTPS redirect ------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.alkeyya.com;
    return 301 https://$host$request_uri;
}

# ---- HTTPS -----------------------------------------------------------------
server {
    # http2 is set inline on the listen line (Nginx 1.24 dropped the standalone
    # `http2 on;` directive form you hit earlier).
    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;
    server_name app.alkeyya.com;

    ssl_certificate     /etc/letsencrypt/live/alkeyya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alkeyya.com/privkey.pem;

    # Reasonable modern TLS defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ---- TLS session + OCSP stapling hardening -----------------------------
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout     5s;

    # ---- HSTS (read the warning block at the top of this file first) -------
    # Two-year max-age, applies to subdomains, and requests preload-list
    # inclusion. `always` ensures the header is sent even on error responses.
    add_header Strict-Transport-Security
        "max-age=63072000; includeSubDomains; preload" always;

    # ---- Security headers (complement the app-level headers; Nginx sets these
    #      for ALL responses, including static assets served before Next.js) --
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 2m;

    # ---- API: strip the /api prefix before proxying ------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3020/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Web app -----------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
