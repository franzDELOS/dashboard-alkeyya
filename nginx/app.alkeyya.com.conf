# Alkeyya Customer Dashboard — app.alkeyya.com
# Drop into /etc/nginx/sites-available/ and symlink into sites-enabled/.
# Reuses your existing wildcard cert for *.alkeyya.com.
#
# Routing:
#   /        -> Next.js web app   (127.0.0.1:3001)
#   /api/    -> Express API        (127.0.0.1:3020, /api prefix stripped)

# ---- HTTP -> HTTPS redirect ------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.alkeyya.com;
    return 301 https://$host$request_uri;
}

# ---- HTTPS -----------------------------------------------------------------
server {
    # http2 is set inline on the listen line (Nginx 1.24 dropped the standalone
    # `http2 on;` directive form you hit earlier).
    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;
    server_name app.alkeyya.com;

    ssl_certificate     /etc/letsencrypt/live/alkeyya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alkeyya.com/privkey.pem;

    # Reasonable modern TLS defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Let the app set HSTS once you have confirmed HTTPS everywhere (Phase 5).
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 2m;

    # ---- API: strip the /api prefix before proxying ------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3020/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Web app -----------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
